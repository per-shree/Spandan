<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Inaugurate</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; font-family: "Segoe UI", system-ui, sans-serif; color: #e8ecf2; background: linear-gradient(170deg, #020408 0%, #060a14 40%, #0a0e1a 70%, #030610 100%); }
    body { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0; padding: 24px; -webkit-user-select: none; user-select: none; position: relative; min-height: 100%; }

    .badge { display: inline-flex; align-items: center; gap: 8px; border: 1px solid rgba(100,160,220,.3); border-radius: 999px; padding: 8px 20px; font: 600 12px/1 sans-serif; letter-spacing: 3px; text-transform: uppercase; color: #7eb8e0; margin-bottom: 22px; margin-top: -40px; }
    .badge::before { content: "\1F4E1"; font-size: 14px; }

    .title { text-align: center; margin-bottom: 8px; font-size: 32px; font-weight: 800; background: linear-gradient(135deg, #ffffff 0%, #a8d8ff 40%, #4da8ff 65%, #2b7de9 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

    .subtitle { font-size: 14px; color: #6a7a90; text-align: center; line-height: 1.5; margin-bottom: 52px; }

    @keyframes pulse-ring { 0% { transform: scale(1); opacity: .55; } 100% { transform: scale(1.75); opacity: 0; } }
    @keyframes breathe {
      0%,100% { box-shadow: 0 0 0 18px rgba(100,210,255,.13), 0 0 0 38px rgba(140,190,255,.08), 0 0 60px 10px rgba(0,190,255,.25), 0 0 120px 20px rgba(160,100,255,.12); }
      50%  { box-shadow: 0 0 0 22px rgba(100,210,255,.18), 0 0 0 50px rgba(140,190,255,.1),  0 0 80px 20px rgba(0,190,255,.35), 0 0 160px 30px rgba(160,100,255,.18); }
    }
    @keyframes shimmer { 0% { transform: translateX(-120%) rotate(30deg); } 100% { transform: translateX(120%) rotate(30deg); } }

    .btn-wrap { position: relative; display: grid; place-items: center; margin-bottom: 24px; }
    .ring { position: absolute; border-radius: 50%; pointer-events: none; }
    .ring-1 { width: min(190px, 52vw); height: min(190px, 52vw); background: radial-gradient(circle, rgba(255,255,255,.45) 0%, rgba(180,230,255,.2) 40%, transparent 70%); animation: pulse-ring 3s ease-out infinite; }
    .ring-2 { width: min(190px, 52vw); height: min(190px, 52vw); background: radial-gradient(circle, rgba(200,180,255,.3) 0%, rgba(140,160,255,.12) 50%, transparent 70%); animation: pulse-ring 3s ease-out infinite 1.5s; }

    #playBtn { width: min(190px, 52vw); height: min(190px, 52vw); border-radius: 50%; border: none; background: linear-gradient(160deg, #00d4ff 0%, #1a9fff 40%, #1a6ff5 75%, #2255e8 100%); color: #fff; font: 800 15px/1 sans-serif; letter-spacing: 4px; text-transform: uppercase; cursor: pointer; display: grid; place-items: center; text-shadow: 0 1px 8px rgba(0,100,200,.4); transition: transform .2s cubic-bezier(.34,1.56,.64,1); animation: breathe 3.5s ease-in-out infinite; position: relative; z-index: 1; overflow: hidden; }
    #playBtn::before { content: ""; position: absolute; top: -60%; left: -60%; width: 220%; height: 220%; background: linear-gradient(110deg, transparent 38%, rgba(255,255,255,.18) 45%, rgba(255,255,255,.28) 50%, rgba(255,255,255,.18) 55%, transparent 62%); animation: shimmer 3.5s ease-in-out infinite; pointer-events: none; }
    #playBtn:active { transform: scale(.9); animation: none; box-shadow: 0 0 30px rgba(0,180,255,.3); }

    #status { font: 400 11px/1 sans-serif; letter-spacing: 1px; text-transform: uppercase; color: #4a6078; text-align: center; min-height: 16px; margin-top: 36px; opacity: .7; }
    #status.ok { color: #6fd6a4; }
    #status.warn { color: #ff7b72; }

    .footer { position: absolute; bottom: 24px; left: 0; right: 0; text-align: center; font: 600 11px/1 sans-serif; letter-spacing: 2px; text-transform: uppercase; color: #2e3d52; }

    @media (max-width: 400px) {
      body { padding: 16px; }
      .title { font-size: 24px; }
      .subtitle { font-size: 12px; margin-bottom: 24px; }
      .badge { padding: 6px 14px; font-size: 10px; margin-bottom: 14px; }
      #playBtn { font-size: 12px; letter-spacing: 3px; }
    }
  </style>
</head>
<body>
  <div class="badge">Remote Control</div>
  <div class="title">Amrut Spandan 2K26</div>
  <div class="subtitle">Tap the button below to inaugurate the event<br>on the big screen</div>
  <div class="btn-wrap">
    <div class="ring ring-2"></div>
    <div class="ring ring-1"></div>
    <button id="playBtn">Inaugurate</button>
  </div>
  <div id="status">Waiting for your tap...</div>
  <div class="footer">Made with ❤️ by Team Amrut Spandan</div>
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <script>
    var BROKER = "wss://broker.hivemq.com:8884/mqtt";
    var TOPIC = "spandan/inauguration/ctrl";
    var playBtn = document.getElementById("playBtn");
    var statusEl = document.getElementById("status");
    function setStatus(t, cls) { statusEl.textContent = t; statusEl.className = cls || ""; }
    var client = mqtt.connect(BROKER, { clean: true, reconnectPeriod: 2000, clientId: "remote_" + Math.random().toString(16).slice(2, 10) });
    client.on("connect", function () { setStatus("Connected. Ready!", "ok"); });
    client.on("reconnect", function () { setStatus("Reconnecting...", "warn"); });
    client.on("error", function () { setStatus("Connection error", "warn"); });
    function send(cmd) {
      if (!client || !client.connected) { setStatus("Not connected yet", "warn"); return; }
      client.publish(TOPIC, JSON.stringify({ cmd: cmd, at: Date.now() }), { qos: 1 }, function () { setStatus("Sent: " + cmd, "ok"); });
    }
    playBtn.addEventListener("click", function () { send("play"); });
  </script>
</body>
</html>
